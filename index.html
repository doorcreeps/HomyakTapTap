<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>Хомяк-Кликер — Максимальная адаптация</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            -webkit-touch-callout: none;
        }

        body {
            background: linear-gradient(145deg, #2e5f3e 0%, #1e3a2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 12px;
            touch-action: manipulation;
        }

        /* Игровая карточка — адаптивный размер */
        .game-container {
            background: rgba(255, 215, 150, 0.94);
            border-radius: clamp(40px, 12vw, 80px) clamp(40px, 12vw, 80px) clamp(30px, 8vw, 60px) clamp(30px, 8vw, 60px);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.3), inset 0 1px 4px rgba(255, 255, 200, 0.8);
            padding: clamp(15px, 5vw, 25px) clamp(15px, 6vw, 30px) clamp(20px, 6vw, 35px);
            text-align: center;
            max-width: 650px;
            width: 100%;
            transition: all 0.2s ease;
        }

        /* Шапка со счётом и рекордом — гибкая */
        .stats {
            background: #fdf8e7;
            border-radius: 100px;
            padding: 8px 16px;
            margin-bottom: clamp(15px, 4vw, 25px);
            display: flex;
            justify-content: space-between;
            gap: clamp(10px, 3vw, 20px);
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.05), 0 8px 12px rgba(0,0,0,0.1);
        }

        .score-box, .best-box {
            background: #4a2e1e;
            border-radius: 60px;
            padding: 6px 12px;
            flex: 1;
            color: #ffefb9;
            text-shadow: 0 2px 0 #2f1c0f;
            box-shadow: inset 0 1px 2px #b97f4b, 0 4px 8px rgba(0,0,0,0.2);
        }

        .score-box span, .best-box span {
            display: block;
            font-size: clamp(0.7rem, 3vw, 0.9rem);
            letter-spacing: 1px;
            font-weight: 500;
        }

        .score-value, .best-value {
            font-size: clamp(1.4rem, 7vw, 2.5rem);
            font-weight: 800;
            line-height: 1.2;
            margin-top: 4px;
            color: #ffd966;
            word-break: break-word;
        }

        /* Хомяк — адаптивный размер + улучшенный тач */
        .hamster-area {
            margin: 15px 0 20px;
            cursor: pointer;
            position: relative;
            display: flex;
            justify-content: center;
            touch-action: manipulation;
        }

        .hamster {
            background: radial-gradient(circle at 35% 35%, #d9a13b, #b46f2a);
            width: clamp(150px, 45vw, 250px);
            height: clamp(150px, 45vw, 250px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.3), inset 0 -8px 0 #6d3f16, inset 0 2px 10px rgba(255, 235, 170, 0.8);
            transition: transform 0.08s linear, box-shadow 0.1s ease;
            will-change: transform;
            touch-action: manipulation;
        }

        .hamster:active {
            transform: scale(0.94);
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.3), inset 0 -4px 0 #5a3412;
        }

        .hamster-face {
            font-size: clamp(70px, 22vw, 130px);
            filter: drop-shadow(2px 6px 6px rgba(0,0,0,0.3));
            transition: all 0.05s ease;
            pointer-events: none;
        }

        /* Блок улучшений — адаптивные кнопки */
        .upgrades {
            background: #f7e5c2;
            border-radius: clamp(30px, 8vw, 50px);
            padding: clamp(12px, 4vw, 18px);
            margin: 15px 0 10px;
            box-shadow: inset 0 1px 3px #fff2df, 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .upgrade-title {
            font-weight: bold;
            color: #5a3a22;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .upgrade-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .upgrade-btn {
            background: #f5bc70;
            border: none;
            border-radius: 60px;
            padding: 8px 14px;
            font-weight: bold;
            font-size: clamp(0.75rem, 3.5vw, 0.95rem);
            color: #2f2016;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #8b5a2b;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            touch-action: manipulation;
            white-space: nowrap;
        }
        
        /* Для очень узких экранов переносим текст */
        @media (max-width: 480px) {
            .upgrade-btn {
                white-space: normal;
                word-break: keep-all;
                padding: 6px 12px;
            }
        }

        .upgrade-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8b5a2b;
        }

        .upgrade-btn.disabled {
            opacity: 0.5;
            transform: none;
            pointer-events: none;
            filter: grayscale(0.1);
        }

        .reset-btn {
            background: #aa7a4a;
            box-shadow: 0 5px 0 #5e3a1f;
            color: #fff0cf;
        }
        
        .max-btn {
            background: #6f9e3f;
            box-shadow: 0 5px 0 #3d6320;
            color: #fef7cf;
        }

        /* всплывающие очки — адаптивный размер */
        .floating-number {
            position: fixed;
            pointer-events: none;
            font-weight: 800;
            font-size: clamp(1.2rem, 6vw, 2.2rem);
            color: #ffec5e;
            text-shadow: 0 2px 5px #b45f1b;
            z-index: 1000;
            animation: floatUp 0.7s ease-out forwards;
            white-space: nowrap;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0px) scale(0.8);
            }
            70% {
                opacity: 0.9;
                transform: translateY(-70px) scale(1.1);
            }
            100% {
                opacity: 0;
                transform: translateY(-120px) scale(1.3);
            }
        }

        @keyframes tinyShake {
            0% { transform: translate(0,0);}
            25% { transform: translate(1px, -1px);}
            50% { transform: translate(-1px, 1px);}
            100% { transform: translate(0,0);}
        }

        .click-effect {
            animation: tinyShake 0.08s ease-in-out;
        }

        footer {
            font-size: clamp(0.6rem, 2.5vw, 0.75rem);
            color: #4d351b;
            margin-top: 15px;
            opacity: 0.7;
        }
        
        .save-badge {
            background: #4f3a28;
            display: inline-block;
            font-size: clamp(0.6rem, 2.5vw, 0.7rem);
            padding: 3px 12px;
            border-radius: 40px;
            color: #ffeaac;
            margin-top: 10px;
            letter-spacing: 0.3px;
        }
        
        /* Дополнительная адаптация для планшетов */
        @media (min-width: 768px) and (max-width: 1024px) {
            .game-container {
                max-width: 550px;
            }
            .hamster {
                width: 220px;
                height: 220px;
            }
        }
        
        /* Для очень маленьких экранов (типа iPhone SE) */
        @media (max-width: 380px) {
            .upgrade-buttons {
                gap: 8px;
            }
            .upgrade-btn {
                padding: 5px 10px;
                font-size: 0.7rem;
            }
            .stats {
                padding: 6px 12px;
            }
        }
        
        /* Убираем стандартные стили touch-выделений */
        button, div[class*="btn"], .hamster {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        /* Индикатор активного касания для хомяка */
        .hamster.touch-active {
            transform: scale(0.94);
            transition: transform 0.02s;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="stats">
        <div class="score-box">
            <span>🐹 ОЧКИ</span>
            <div class="score-value" id="scoreDisplay">0</div>
        </div>
        <div class="best-box">
            <span>🏆 РЕКОРД</span>
            <div class="best-value" id="bestDisplay">0</div>
        </div>
    </div>

    <div class="hamster-area">
        <div class="hamster" id="hamsterClickZone">
            <div class="hamster-face" id="hamsterFace">🐹</div>
        </div>
    </div>

    <div class="upgrades">
        <div class="upgrade-title">
            ✨ УЛУЧШЕНИЯ ✨
        </div>
        <div class="upgrade-buttons">
            <button class="upgrade-btn" id="autoClickerBtn">
                🤖 Авто-кликер <span id="autoLevel">0</span> ⚡ (<span id="autoCost">50</span>)
            </button>
            <button class="upgrade-btn" id="powerUpBtn">
                💪 Сила клика <span id="powerLevel">0</span> 🔨 (<span id="powerCost">30</span>)
            </button>
            <button class="upgrade-btn max-btn" id="maxAutoBtn">
                ⚡ MAX авто
            </button>
            <button class="upgrade-btn max-btn" id="maxPowerBtn">
                💥 MAX силу
            </button>
            <button class="upgrade-btn reset-btn" id="resetGameBtn">
                🔄 Сброс
            </button>
        </div>
        <div style="font-size: clamp(0.7rem, 3vw, 0.8rem); margin-top: 12px; color:#61482e;">
            💡 Тапай на хомяка → +<span id="clickPowerDisplay">1</span> очко
        </div>
        <div class="save-badge">💾 Автосохранение | 1k, 1M, 1B, 1T, 1qa...</div>
    </div>
    <footer>🐹 Адаптивный кликер — работает на любом устройстве</footer>
</div>

<script>
    (function(){
        // ---------- Ключи для localStorage ----------
        const STORAGE_KEYS = {
            SCORE: 'hamsterScoreAdapt',
            AUTO_LEVEL: 'hamsterAutoLevelAdapt',
            POWER_LEVEL: 'hamsterPowerLevelAdapt',
            BEST_SCORE: 'hamsterBestScoreAdapt'
        };
        
        // ---------- Игровые данные ----------
        let score = 0;
        let bestScore = 0;
        let autoClickerLevel = 0;
        let powerUpLevel = 0;
        let autoInterval = null;
        
        // DOM элементы
        const scoreDisplay = document.getElementById('scoreDisplay');
        const bestDisplay = document.getElementById('bestDisplay');
        const hamsterZone = document.getElementById('hamsterClickZone');
        const autoClickerBtn = document.getElementById('autoClickerBtn');
        const powerUpBtn = document.getElementById('powerUpBtn');
        const maxAutoBtn = document.getElementById('maxAutoBtn');
        const maxPowerBtn = document.getElementById('maxPowerBtn');
        const resetGameBtn = document.getElementById('resetGameBtn');
        const autoLevelSpan = document.getElementById('autoLevel');
        const autoCostSpan = document.getElementById('autoCost');
        const powerLevelSpan = document.getElementById('powerLevel');
        const powerCostSpan = document.getElementById('powerCost');
        const clickPowerDisplay = document.getElementById('clickPowerDisplay');
        
        // ---------- Форматирование чисел (k, M, B, T, qa, qi, sx, sp, oc, no, dc) ----------
        function formatNumber(num) {
            if (num === undefined || num === null) return "0";
            let n = Math.floor(num);
            if (n < 1000) return n.toString();
            
            const suffixes = [
                { value: 1e3, symbol: "k" },
                { value: 1e6, symbol: "M" },
                { value: 1e9, symbol: "B" },
                { value: 1e12, symbol: "T" },
                { value: 1e15, symbol: "qa" },
                { value: 1e18, symbol: "qi" },
                { value: 1e21, symbol: "sx" },
                { value: 1e24, symbol: "sp" },
                { value: 1e27, symbol: "oc" },
                { value: 1e30, symbol: "no" },
                { value: 1e33, symbol: "dc" }
            ];
            
            for (let i = suffixes.length - 1; i >= 0; i--) {
                if (n >= suffixes[i].value) {
                    let val = n / suffixes[i].value;
                    let formatted = val.toFixed(2).replace(/\.00$/, '');
                    return formatted + suffixes[i].symbol;
                }
            }
            return n.toString();
        }
        
        function updateDisplay() {
            scoreDisplay.innerText = formatNumber(score);
            bestDisplay.innerText = formatNumber(bestScore);
        }
        
        // Цены (с ограничением, чтобы игра не ломалась)
        function getAutoCost() {
            return Math.min(25000, 50 + autoClickerLevel * 18);
        }
        
        function getPowerCost() {
            return Math.min(18000, 30 + powerUpLevel * 12);
        }
        
        function updateUI() {
            const autoCost = getAutoCost();
            const powerCost = getPowerCost();
            
            autoCostSpan.innerText = formatNumber(autoCost);
            powerCostSpan.innerText = formatNumber(powerCost);
            autoLevelSpan.innerText = autoClickerLevel;
            powerLevelSpan.innerText = powerUpLevel;
            
            const totalClickPower = 1 + powerUpLevel;
            clickPowerDisplay.innerText = totalClickPower;
            
            if (score < autoCost) {
                autoClickerBtn.classList.add('disabled');
            } else {
                autoClickerBtn.classList.remove('disabled');
            }
            
            if (score < powerCost) {
                powerUpBtn.classList.add('disabled');
            } else {
                powerUpBtn.classList.remove('disabled');
            }
            
            // Обновляем рекорд
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem(STORAGE_KEYS.BEST_SCORE, Math.floor(bestScore));
            }
            updateDisplay();
        }
        
        function saveGame() {
            localStorage.setItem(STORAGE_KEYS.SCORE, Math.floor(score));
            localStorage.setItem(STORAGE_KEYS.AUTO_LEVEL, autoClickerLevel);
            localStorage.setItem(STORAGE_KEYS.POWER_LEVEL, powerUpLevel);
            localStorage.setItem(STORAGE_KEYS.BEST_SCORE, Math.floor(bestScore));
        }
        
        function loadGame() {
            const savedScore = localStorage.getItem(STORAGE_KEYS.SCORE);
            if (savedScore !== null && !isNaN(parseInt(savedScore))) score = parseInt(savedScore);
            else score = 0;
            
            const savedAuto = localStorage.getItem(STORAGE_KEYS.AUTO_LEVEL);
            if (savedAuto !== null && !isNaN(parseInt(savedAuto))) autoClickerLevel = parseInt(savedAuto);
            else autoClickerLevel = 0;
            
            const savedPower = localStorage.getItem(STORAGE_KEYS.POWER_LEVEL);
            if (savedPower !== null && !isNaN(parseInt(savedPower))) powerUpLevel = parseInt(savedPower);
            else powerUpLevel = 0;
            
            const savedBest = localStorage.getItem(STORAGE_KEYS.BEST_SCORE);
            if (savedBest !== null && !isNaN(parseInt(savedBest))) bestScore = parseInt(savedBest);
            else bestScore = 0;
            
            if (score < 0) score = 0;
            if (autoClickerLevel < 0) autoClickerLevel = 0;
            if (powerUpLevel < 0) powerUpLevel = 0;
            if (bestScore < 0) bestScore = 0;
        }
        
        function restartAutoClicker() {
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
            }
            if (autoClickerLevel > 0) {
                autoInterval = setInterval(() => {
                    if (autoClickerLevel > 0) {
                        let autoGain = autoClickerLevel;
                        addScore(autoGain, false, true);
                        showFloatingText(`🤖 +${autoGain}`, hamsterZone, '#b3ffa7');
                        saveGame();
                        updateUI();
                    }
                }, 1000);
            }
        }
        
        function addScore(amount, fromClick = false, isAuto = false) {
            if (amount <= 0) return;
            score += amount;
            score = Math.floor(score);
            if (score > bestScore) {
                bestScore = score;
            }
            updateUI();
            saveGame();
            
            if (fromClick && hamsterZone) {
                showFloatingText(`+${amount}`, hamsterZone, '#ffd966');
            }
        }
        
        function showFloatingText(text, originElement, colorHint = '#ffec5e') {
            if (!originElement) return;
            const rect = originElement.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            const div = document.createElement('div');
            div.className = 'floating-number';
            div.innerText = text;
            div.style.left = x - 25 + 'px';
            div.style.top = y - 20 + 'px';
            div.style.color = colorHint;
            div.style.fontWeight = 'bold';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 700);
        }
        
        // Улучшенный эффект для тач-устройств
        function addHamsterClickEffect() {
            const hamsterDiv = document.querySelector('.hamster');
            if (hamsterDiv) {
                hamsterDiv.classList.add('click-effect');
                setTimeout(() => hamsterDiv.classList.remove('click-effect'), 100);
            }
            const faceSpan = document.getElementById('hamsterFace');
            if (faceSpan) {
                const original = faceSpan.innerText;
                faceSpan.innerText = '🐹💥';
                setTimeout(() => faceSpan.innerText = original, 150);
            }
            // Легкая вибрация для мобильных (если поддерживается)
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(20);
            }
        }
        
        function onHamsterClick(e) {
            e.preventDefault();
            const clickValue = 1 + powerUpLevel;
            addScore(clickValue, true, false);
            addHamsterClickEffect();
        }
        
        // Обработка тач-событий для предотвращения зума и двойного клика
        function attachTouchEvents() {
            hamsterZone.addEventListener('touchstart', (e) => {
                e.preventDefault();
                onHamsterClick(e);
            }, { passive: false });
            hamsterZone.addEventListener('mousedown', (e) => {
                e.preventDefault();
                onHamsterClick(e);
            });
        }
        
        function buyAuto() {
            const cost = getAutoCost();
            if (score >= cost) {
                score -= cost;
                autoClickerLevel++;
                restartAutoClicker();
                updateUI();
                saveGame();
                showFloatingText(`🚀 Авто lvl ${autoClickerLevel}`, autoClickerBtn, '#ffbc6e');
                if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(10);
            } else {
                showFloatingText(`🧀 Нужно ${formatNumber(cost)}`, autoClickerBtn, '#ffaa88');
            }
        }
        
        function buyPower() {
            const cost = getPowerCost();
            if (score >= cost) {
                score -= cost;
                powerUpLevel++;
                updateUI();
                saveGame();
                showFloatingText(`💪 Сила +1 (теперь +${1+powerUpLevel})`, powerUpBtn, '#ffb347');
                if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(10);
            } else {
                showFloatingText(`🧀 Нужно ${formatNumber(cost)}`, powerUpBtn, '#ffaa88');
            }
        }
        
        // MAX покупки с защитой от зависания
        function buyMaxAuto() {
            if (score <= 0) {
                showFloatingText(`Нет очков для авто`, maxAutoBtn, '#ffaa88');
                return;
            }
            let boughtCount = 0;
            let maxLoops = 800;
            while (maxLoops-- > 0) {
                let currentCost = getAutoCost();
                if (score >= currentCost) {
                    score -= currentCost;
                    autoClickerLevel++;
                    boughtCount++;
                } else {
                    break;
                }
            }
            if (boughtCount > 0) {
                restartAutoClicker();
                updateUI();
                saveGame();
                showFloatingText(`⚡ Куплено авто x${boughtCount}! Уровень ${autoClickerLevel}`, maxAutoBtn, '#e5ff9e');
                if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(15);
            } else {
                showFloatingText(`Не хватает на 1 авто (${formatNumber(getAutoCost())})`, maxAutoBtn, '#ffaa88');
            }
        }
        
        function buyMaxPower() {
            if (score <= 0) {
                showFloatingText(`Нет очков для силы`, maxPowerBtn, '#ffaa88');
                return;
            }
            let boughtCount = 0;
            let maxLoops = 800;
            while (maxLoops-- > 0) {
                let currentCost = getPowerCost();
                if (score >= currentCost) {
                    score -= currentCost;
                    powerUpLevel++;
                    boughtCount++;
                } else {
                    break;
                }
            }
            if (boughtCount > 0) {
                updateUI();
                saveGame();
                showFloatingText(`💥 Сила клика +${boughtCount} (теперь +${1+powerUpLevel})`, maxPowerBtn, '#ffd966');
                if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(15);
            } else {
                showFloatingText(`Не хватает на 1 силу (${formatNumber(getPowerCost())})`, maxPowerBtn, '#ffaa88');
            }
        }
        
        function resetGame() {
            if (confirm('Сбросить прогресс? Очки, улучшения обнулятся. Рекорд останется.')) {
                if (autoInterval) {
                    clearInterval(autoInterval);
                    autoInterval = null;
                }
                score = 0;
                autoClickerLevel = 0;
                powerUpLevel = 0;
                restartAutoClicker();
                updateUI();
                saveGame();
                showFloatingText(`🌀 Игра сброшена`, resetGameBtn, '#ffbf8f');
                if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(30);
            }
        }
        
        function handleBeforeUnload() {
            saveGame();
        }
        
        // Адаптивная коррекция для безопасной области (iOS)
        function setSafeArea() {
            const container = document.querySelector('.game-container');
            if (container && window.visualViewport) {
                const safeTop = window.visualViewport.offsetTop;
                if (safeTop > 0) container.style.marginTop = `${safeTop}px`;
            }
        }
        
        function init() {
            loadGame();
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem(STORAGE_KEYS.BEST_SCORE, bestScore);
            }
            updateUI();
            restartAutoClicker();
            
            // Используем улучшенные события для тач и мыши
            attachTouchEvents();
            
            // Обычные клики для кнопок
            autoClickerBtn.addEventListener('click', (e) => { e.stopPropagation(); buyAuto(); });
            powerUpBtn.addEventListener('click', (e) => { e.stopPropagation(); buyPower(); });
            maxAutoBtn.addEventListener('click', (e) => { e.stopPropagation(); buyMaxAuto(); });
            maxPowerBtn.addEventListener('click', (e) => { e.stopPropagation(); buyMaxPower(); });
            resetGameBtn.addEventListener('click', (e) => { e.stopPropagation(); resetGame(); });
            
            window.addEventListener('beforeunload', handleBeforeUnload);
            document.addEventListener('visibilitychange', () => { if (document.hidden) saveGame(); });
            
            // Адаптация для безопасной зоны
            window.addEventListener('resize', setSafeArea);
            setSafeArea();
            
            // Отключаем контекстное меню на хомяке
            hamsterZone.addEventListener('contextmenu', (e) => e.preventDefault());
        }
        
        init();
    })();
</script>
</body>
</html>
