<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Хомяк-Кликер — с сохранением прогресса</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #2e5f3e 0%, #1e3a2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Игровая карточка */
        .game-container {
            background: rgba(255, 215, 150, 0.9);
            border-radius: 80px 80px 60px 60px;
            box-shadow: 0 30px 30px rgba(0, 0, 0, 0.3), inset 0 1px 4px rgba(255, 255, 200, 0.8);
            padding: 20px 25px 35px;
            text-align: center;
            max-width: 550px;
            width: 100%;
            transition: all 0.2s ease;
        }

        /* Шапка со счётом и рекордом */
        .stats {
            background: #fdf8e7;
            border-radius: 100px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            gap: 15px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.05), 0 8px 12px rgba(0,0,0,0.1);
        }

        .score-box, .best-box {
            background: #4a2e1e;
            border-radius: 60px;
            padding: 8px 18px;
            flex: 1;
            color: #ffefb9;
            text-shadow: 0 2px 0 #2f1c0f;
            box-shadow: inset 0 1px 2px #b97f4b, 0 4px 8px rgba(0,0,0,0.2);
        }

        .score-box span, .best-box span {
            display: block;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .score-value, .best-value {
            font-size: 2.8rem;
            font-weight: 800;
            line-height: 1;
            margin-top: 5px;
            color: #ffd966;
        }

        /* Хомяк - главная цель */
        .hamster-area {
            margin: 15px 0 20px;
            cursor: pointer;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .hamster {
            background: radial-gradient(circle at 35% 35%, #d9a13b, #b46f2a);
            width: 220px;
            height: 220px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.3), inset 0 -8px 0 #6d3f16, inset 0 2px 10px rgba(255, 235, 170, 0.8);
            transition: transform 0.08s linear, box-shadow 0.1s ease;
            will-change: transform;
        }

        /* Анимация нажатия */
        .hamster:active {
            transform: scale(0.94);
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.3), inset 0 -4px 0 #5a3412;
        }

        /* мордочка хомяка */
        .hamster-face {
            font-size: 110px;
            filter: drop-shadow(2px 6px 6px rgba(0,0,0,0.3));
            transition: all 0.05s ease;
        }

        /* Бонусные кнопки и апгрейд */
        .upgrades {
            background: #f7e5c2;
            border-radius: 50px;
            padding: 15px 15px;
            margin: 20px 0 10px;
            box-shadow: inset 0 1px 3px #fff2df, 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .upgrade-title {
            font-weight: bold;
            color: #5a3a22;
            font-size: 1.1rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .upgrade-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .upgrade-btn {
            background: #f5bc70;
            border: none;
            border-radius: 60px;
            padding: 10px 16px;
            font-weight: bold;
            font-size: 1rem;
            color: #2f2016;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #8b5a2b;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .upgrade-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8b5a2b;
        }

        .upgrade-btn.disabled {
            opacity: 0.5;
            transform: none;
            pointer-events: none;
            filter: grayscale(0.1);
        }

        .reset-btn {
            background: #aa7a4a;
            box-shadow: 0 5px 0 #5e3a1f;
            color: #fff0cf;
        }

        /* всплывающие +1 очки */
        .floating-number {
            position: fixed;
            pointer-events: none;
            font-weight: 800;
            font-size: 1.8rem;
            color: #ffec5e;
            text-shadow: 0 2px 5px #b45f1b;
            z-index: 1000;
            animation: floatUp 0.7s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0px) scale(0.8);
            }
            70% {
                opacity: 0.9;
                transform: translateY(-70px) scale(1.1);
            }
            100% {
                opacity: 0;
                transform: translateY(-120px) scale(1.3);
            }
        }

        /* анимация вибрации при клике */
        @keyframes tinyShake {
            0% { transform: translate(0,0);}
            25% { transform: translate(1px, -1px);}
            50% { transform: translate(-1px, 1px);}
            100% { transform: translate(0,0);}
        }

        .click-effect {
            animation: tinyShake 0.08s ease-in-out;
        }

        footer {
            font-size: 0.7rem;
            color: #4d351b;
            margin-top: 15px;
            opacity: 0.7;
        }
        
        .save-badge {
            background: #4f3a28;
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 40px;
            color: #ffeaac;
            margin-top: 8px;
        }

        @media (max-width: 480px) {
            .hamster {
                width: 180px;
                height: 180px;
            }
            .hamster-face {
                font-size: 90px;
            }
            .score-value, .best-value {
                font-size: 2rem;
            }
            .upgrade-btn {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="stats">
        <div class="score-box">
            <span>🍀 ОЧКИ</span>
            <div class="score-value" id="scoreDisplay">0</div>
        </div>
        <div class="best-box">
            <span>🏆 РЕКОРД</span>
            <div class="best-value" id="bestDisplay">0</div>
        </div>
    </div>

    <div class="hamster-area">
        <div class="hamster" id="hamsterClickZone">
            <div class="hamster-face" id="hamsterFace">🐹</div>
        </div>
    </div>

    <div class="upgrades">
        <div class="upgrade-title">
            ✨ УЛУЧШЕНИЯ ✨
        </div>
        <div class="upgrade-buttons">
            <button class="upgrade-btn" id="autoClickerBtn">
                🤖 Авто-кликер <span id="autoLevel">0</span> ⚡ (<span id="autoCost">50</span>)
            </button>
            <button class="upgrade-btn" id="powerUpBtn">
                💪 Сила клика <span id="powerLevel">0</span> 🔨 (<span id="powerCost">30</span>)
            </button>
            <button class="upgrade-btn reset-btn" id="resetGameBtn">
                🔄 Сброс
            </button>
        </div>
        <div style="font-size: 0.75rem; margin-top: 12px; color:#61482e;">
            💡 Тапай на хомяка → +<span id="clickPowerDisplay">1</span> очко
        </div>
        <div class="save-badge">💾 Всё сохраняется автоматически</div>
    </div>
    <footer>🐹 Чем больше кликаешь, тем быстрее прогресс!</footer>
</div>

<script>
    (function(){
        // ---------- Ключи для localStorage ----------
        const STORAGE_KEYS = {
            SCORE: 'hamsterScore',
            AUTO_LEVEL: 'hamsterAutoLevel',
            POWER_LEVEL: 'hamsterPowerLevel',
            BEST_SCORE: 'hamsterBestScore'
        };
        
        // ---------- Игровые данные ----------
        let score = 0;                  // текущие очки
        let bestScore = 0;             // рекорд
        let autoClickerLevel = 0;      // уровень автокликера
        let powerUpLevel = 0;          // уровень улучшения силы клика
        
        // Цены на улучшения (базовые, но будут пересчитываться динамически)
        let currentAutoCost = 50;
        let currentPowerCost = 30;
        
        // Интервал для авто-кликера
        let autoInterval = null;
        
        // DOM элементы
        const scoreDisplay = document.getElementById('scoreDisplay');
        const bestDisplay = document.getElementById('bestDisplay');
        const hamsterZone = document.getElementById('hamsterClickZone');
        const autoClickerBtn = document.getElementById('autoClickerBtn');
        const powerUpBtn = document.getElementById('powerUpBtn');
        const resetGameBtn = document.getElementById('resetGameBtn');
        const autoLevelSpan = document.getElementById('autoLevel');
        const autoCostSpan = document.getElementById('autoCost');
        const powerLevelSpan = document.getElementById('powerLevel');
        const powerCostSpan = document.getElementById('powerCost');
        const clickPowerDisplay = document.getElementById('clickPowerDisplay');
        
        // ---------- Функции сохранения и загрузки ----------
        function saveGameToLocal() {
            // Сохраняем текущие очки, уровни (целые числа)
            localStorage.setItem(STORAGE_KEYS.SCORE, Math.floor(score));
            localStorage.setItem(STORAGE_KEYS.AUTO_LEVEL, autoClickerLevel);
            localStorage.setItem(STORAGE_KEYS.POWER_LEVEL, powerUpLevel);
            // Рекорд сохраняется отдельно при его обновлении (но продублируем на всякий)
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem(STORAGE_KEYS.BEST_SCORE, Math.floor(bestScore));
            } else {
                // Всё равно сохраняем текущий лучший
                localStorage.setItem(STORAGE_KEYS.BEST_SCORE, Math.floor(bestScore));
            }
        }
        
        function loadGameFromLocal() {
            // Загружаем очки
            const savedScore = localStorage.getItem(STORAGE_KEYS.SCORE);
            if (savedScore !== null && !isNaN(parseInt(savedScore))) {
                score = parseInt(savedScore);
            } else {
                score = 0;
            }
            
            // Загружаем уровень автокликера
            const savedAuto = localStorage.getItem(STORAGE_KEYS.AUTO_LEVEL);
            if (savedAuto !== null && !isNaN(parseInt(savedAuto))) {
                autoClickerLevel = parseInt(savedAuto);
            } else {
                autoClickerLevel = 0;
            }
            
            // Загружаем уровень силы клика
            const savedPower = localStorage.getItem(STORAGE_KEYS.POWER_LEVEL);
            if (savedPower !== null && !isNaN(parseInt(savedPower))) {
                powerUpLevel = parseInt(savedPower);
            } else {
                powerUpLevel = 0;
            }
            
            // Загружаем рекорд
            const savedBest = localStorage.getItem(STORAGE_KEYS.BEST_SCORE);
            if (savedBest !== null && !isNaN(parseInt(savedBest))) {
                bestScore = parseInt(savedBest);
            } else {
                bestScore = 0;
            }
            
            // Небольшая валидация: если очки отрицательные или NaN
            if (isNaN(score) || score < 0) score = 0;
            if (isNaN(autoClickerLevel) || autoClickerLevel < 0) autoClickerLevel = 0;
            if (isNaN(powerUpLevel) || powerUpLevel < 0) powerUpLevel = 0;
            if (isNaN(bestScore) || bestScore < 0) bestScore = 0;
        }
        
        // Функция пересчёта цен (зависит от уровней)
        function updateCosts() {
            // Авто-кликер: цена растёт, но ограничим 350, чтобы не было бесконечно дорого
            let autoCostCalculated = Math.min(380, 50 + autoClickerLevel * 18);
            currentAutoCost = autoCostCalculated;
            autoCostSpan.innerText = currentAutoCost;
            
            // Сила клика: цена базовая 30 + уровень*12, макс 280
            let powerCostCalculated = Math.min(280, 30 + powerUpLevel * 12);
            currentPowerCost = powerCostCalculated;
            powerCostSpan.innerText = currentPowerCost;
        }
        
        // Обновить интерфейс: счёт, рекорд, кнопки, отображение силы клика
        function updateUI() {
            // Отображаем текущие очки (целые)
            scoreDisplay.innerText = Math.floor(score);
            
            // Обновляем рекорд: если текущий счёт больше сохранённого, обновляем
            if (score > bestScore) {
                bestScore = Math.floor(score);
                localStorage.setItem(STORAGE_KEYS.BEST_SCORE, bestScore);
            }
            bestDisplay.innerText = Math.floor(bestScore);
            
            // Сила клика = 1 (базовая) + бонус от уровня
            let totalClickPower = 1 + powerUpLevel;
            clickPowerDisplay.innerText = totalClickPower;
            
            // Отображаем уровни
            autoLevelSpan.innerText = autoClickerLevel;
            powerLevelSpan.innerText = powerUpLevel;
            
            // Пересчитываем цены (зависит от текущих уровней)
            updateCosts();
            
            // Блокируем кнопки если не хватает очков
            if (score < currentAutoCost) {
                autoClickerBtn.classList.add('disabled');
            } else {
                autoClickerBtn.classList.remove('disabled');
            }
            
            if (score < currentPowerCost) {
                powerUpBtn.classList.add('disabled');
            } else {
                powerUpBtn.classList.remove('disabled');
            }
        }
        
        // Перезапуск интервала автокликера (при изменении уровня)
        function restartAutoClicker() {
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
            }
            if (autoClickerLevel > 0) {
                // Каждый уровень автокликера даёт +autoClickerLevel очков каждую секунду
                autoInterval = setInterval(() => {
                    if (autoClickerLevel > 0 && !isNaN(autoClickerLevel)) {
                        let autoGain = autoClickerLevel;
                        addScore(autoGain, false, null, true);
                        // Показываем всплывающее уведомление об автодобыче
                        showFloatingText(`🤖 +${autoGain}`, hamsterZone, '#b3ffa7');
                        // Сохраняем состояние после авто-начисления
                        saveGameToLocal();
                    }
                }, 1000);
            }
        }
        
        // Основная функция добавления очков
        // fromClick: true если вызвано кликом по хомяку, false если автокликер или бонус
        // sourceElement: откуда появится парящая цифра
        // isAuto: флаг для особой анимации
        function addScore(amount, fromClick = true, sourceElement = null, isAuto = false) {
            if (amount <= 0) return;
            score += amount;
            // если счёт стал сумасшедшим, ограничивать не будем, но сохраним целым
            score = Math.floor(score);
            
            // Обновляем UI
            updateUI();
            
            // Сохраняем прогресс после каждого изменения очков!
            saveGameToLocal();
            
            // Анимация + очки
            if (fromClick && sourceElement) {
                showFloatingText(`+${amount}`, sourceElement, '#ffd966');
            } else if (isAuto && hamsterZone) {
                // для авто - уже сделали отдельный вызов
            } else if (!fromClick && !isAuto && sourceElement) {
                showFloatingText(`✨ +${amount}`, sourceElement, '#ffd29b');
            }
        }
        
        // Парящие числа (красиво)
        function showFloatingText(text, originElement, colorHint = '#ffec5e') {
            if (!originElement) return;
            const rect = originElement.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            const div = document.createElement('div');
            div.className = 'floating-number';
            div.innerText = text;
            div.style.left = x - 25 + 'px';
            div.style.top = y - 20 + 'px';
            div.style.color = colorHint;
            div.style.fontWeight = 'bold';
            div.style.fontSize = '1.8rem';
            document.body.appendChild(div);
            setTimeout(() => {
                div.remove();
            }, 700);
        }
        
        // Эффект при клике на хомяка (встряска + смена эмодзи)
        function addHamsterClickEffect() {
            const hamsterDiv = document.querySelector('.hamster');
            if (hamsterDiv) {
                hamsterDiv.classList.add('click-effect');
                setTimeout(() => {
                    hamsterDiv.classList.remove('click-effect');
                }, 100);
            }
            const faceSpan = document.getElementById('hamsterFace');
            if (faceSpan) {
                const original = faceSpan.innerText;
                faceSpan.innerText = '🐹💥';
                setTimeout(() => {
                    faceSpan.innerText = original;
                }, 150);
            }
        }
        
        // Обработчик клика по хомяку
        function onHamsterClick(event) {
            const clickValue = 1 + powerUpLevel;   // базовая сила + апгрейд
            addScore(clickValue, true, hamsterZone, false);
            addHamsterClickEffect();
            // Дополнительно сохраняем (addScore уже сохраняет)
        }
        
        // Покупка авто-кликера
        function buyAutoClicker() {
            if (score >= currentAutoCost) {
                score -= currentAutoCost;
                score = Math.floor(score);
                autoClickerLevel++;
                // Перезапускаем интервал с новым уровнем
                restartAutoClicker();
                updateUI();
                saveGameToLocal();
                showFloatingText(`🚀 Авто-кликер lvl ${autoClickerLevel}`, autoClickerBtn, '#ffbc6e');
            } else {
                showFloatingText(`🧀 Не хватает очков! (нужно ${currentAutoCost})`, autoClickerBtn, '#ffaa88');
            }
        }
        
        // Покупка улучшения силы клика
        function buyPowerUp() {
            if (score >= currentPowerCost) {
                score -= currentPowerCost;
                score = Math.floor(score);
                powerUpLevel++;
                updateUI();
                saveGameToLocal();
                showFloatingText(`💪 Сила клика +1! Теперь +${1 + powerUpLevel} за удар`, powerUpBtn, '#ffb347');
            } else {
                showFloatingText(`🧀 Нужно больше очков (${currentPowerCost})`, powerUpBtn, '#ffaa88');
            }
        }
        
        // Сброс игры (с сохранением рекорда? да, рекорд остаётся)
        function resetGame() {
            if (confirm('⚠️ Сбросить ВСЁ, кроме рекорда? Все очки, авто-кликер и сила клика обнулятся.')) {
                // Останавливаем авто-кликер
                if (autoInterval) {
                    clearInterval(autoInterval);
                    autoInterval = null;
                }
                // Сбрасываем переменные
                score = 0;
                autoClickerLevel = 0;
                powerUpLevel = 0;
                // Рекорд НЕ трогаем, оставляем лучший результат в localStorage и в памяти
                updateUI();
                restartAutoClicker(); // уровень 0 -> интервал не запустится
                saveGameToLocal();    // перезаписываем сохранения (score=0, уровни 0)
                showFloatingText(`🌀 Игра сброшена. Рекорд сохранён!`, resetGameBtn, '#ffbf8f');
                // Дополнительно: обновим счёт на экране
                scoreDisplay.innerText = "0";
            }
        }
        
        // Полное сохранение перед закрытием страницы
        function handleBeforeUnload() {
            saveGameToLocal();
        }
        
        // Инициализация игры: загружаем данные, настраиваем интервал, события
        function init() {
            loadGameFromLocal();     // загружаем score, autoLevel, powerLevel, bestScore из localStorage
            // Убедимся, что если рекорд меньше текущего счёта - обновим
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem(STORAGE_KEYS.BEST_SCORE, bestScore);
            }
            // Первичный рендер UI
            updateUI();
            // Запускаем авто-кликер, если есть уровень
            restartAutoClicker();
            // Привязываем события
            hamsterZone.addEventListener('click', (e) => {
                e.stopPropagation();
                onHamsterClick(e);
            });
            autoClickerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                buyAutoClicker();
            });
            powerUpBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                buyPowerUp();
            });
            resetGameBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                resetGame();
            });
            // Сохраняем игру при закрытии вкладки / перезагрузке
            window.addEventListener('beforeunload', handleBeforeUnload);
            // Также сохраняем при скрытии страницы (для мобильных)
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    saveGameToLocal();
                }
            });
        }
        
        // Запускаем игру
        init();
    })();
</script>
</body>
</>
