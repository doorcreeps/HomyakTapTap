<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Хомяк-Кликер — Мега-апгрейды и сокращения (1k, 1M, 1B)</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #2e5f3e 0%, #1e3a2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Игровая карточка */
        .game-container {
            background: rgba(255, 215, 150, 0.92);
            border-radius: 80px 80px 60px 60px;
            box-shadow: 0 30px 30px rgba(0, 0, 0, 0.3), inset 0 1px 4px rgba(255, 255, 200, 0.8);
            padding: 20px 25px 35px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            transition: all 0.2s ease;
        }

        /* Шапка со счётом и рекордом */
        .stats {
            background: #fdf8e7;
            border-radius: 100px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            gap: 15px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.05), 0 8px 12px rgba(0,0,0,0.1);
        }

        .score-box, .best-box {
            background: #4a2e1e;
            border-radius: 60px;
            padding: 8px 18px;
            flex: 1;
            color: #ffefb9;
            text-shadow: 0 2px 0 #2f1c0f;
            box-shadow: inset 0 1px 2px #b97f4b, 0 4px 8px rgba(0,0,0,0.2);
        }

        .score-box span, .best-box span {
            display: block;
            font-size: 0.8rem;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .score-value, .best-value {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.2;
            margin-top: 5px;
            color: #ffd966;
            word-break: break-word;
        }

        /* Хомяк - главная цель */
        .hamster-area {
            margin: 15px 0 20px;
            cursor: pointer;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .hamster {
            background: radial-gradient(circle at 35% 35%, #d9a13b, #b46f2a);
            width: 220px;
            height: 220px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.3), inset 0 -8px 0 #6d3f16, inset 0 2px 10px rgba(255, 235, 170, 0.8);
            transition: transform 0.08s linear, box-shadow 0.1s ease;
            will-change: transform;
        }

        .hamster:active {
            transform: scale(0.94);
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.3), inset 0 -4px 0 #5a3412;
        }

        .hamster-face {
            font-size: 110px;
            filter: drop-shadow(2px 6px 6px rgba(0,0,0,0.3));
            transition: all 0.05s ease;
        }

        /* Бонусные кнопки и апгрейд */
        .upgrades {
            background: #f7e5c2;
            border-radius: 50px;
            padding: 15px 15px;
            margin: 20px 0 10px;
            box-shadow: inset 0 1px 3px #fff2df, 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .upgrade-title {
            font-weight: bold;
            color: #5a3a22;
            font-size: 1.1rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .upgrade-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .upgrade-btn {
            background: #f5bc70;
            border: none;
            border-radius: 60px;
            padding: 10px 16px;
            font-weight: bold;
            font-size: 0.95rem;
            color: #2f2016;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #8b5a2b;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .upgrade-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8b5a2b;
        }

        .upgrade-btn.disabled {
            opacity: 0.5;
            transform: none;
            pointer-events: none;
            filter: grayscale(0.1);
        }

        .reset-btn {
            background: #aa7a4a;
            box-shadow: 0 5px 0 #5e3a1f;
            color: #fff0cf;
        }
        
        .max-btn {
            background: #6f9e3f;
            box-shadow: 0 5px 0 #3d6320;
            color: #fef7cf;
        }

        /* всплывающие +N очков */
        .floating-number {
            position: fixed;
            pointer-events: none;
            font-weight: 800;
            font-size: 1.8rem;
            color: #ffec5e;
            text-shadow: 0 2px 5px #b45f1b;
            z-index: 1000;
            animation: floatUp 0.7s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0px) scale(0.8);
            }
            70% {
                opacity: 0.9;
                transform: translateY(-70px) scale(1.1);
            }
            100% {
                opacity: 0;
                transform: translateY(-120px) scale(1.3);
            }
        }

        @keyframes tinyShake {
            0% { transform: translate(0,0);}
            25% { transform: translate(1px, -1px);}
            50% { transform: translate(-1px, 1px);}
            100% { transform: translate(0,0);}
        }

        .click-effect {
            animation: tinyShake 0.08s ease-in-out;
        }

        footer {
            font-size: 0.7rem;
            color: #4d351b;
            margin-top: 15px;
            opacity: 0.7;
        }
        
        .save-badge {
            background: #4f3a28;
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 40px;
            color: #ffeaac;
            margin-top: 8px;
        }

        @media (max-width: 480px) {
            .hamster {
                width: 170px;
                height: 170px;
            }
            .hamster-face {
                font-size: 85px;
            }
            .score-value, .best-value {
                font-size: 1.6rem;
            }
            .upgrade-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="stats">
        <div class="score-box">
            <span>🐹 ОЧКИ</span>
            <div class="score-value" id="scoreDisplay">0</div>
        </div>
        <div class="best-box">
            <span>🏆 РЕКОРД</span>
            <div class="best-value" id="bestDisplay">0</div>
        </div>
    </div>

    <div class="hamster-area">
        <div class="hamster" id="hamsterClickZone">
            <div class="hamster-face" id="hamsterFace">🐹</div>
        </div>
    </div>

    <div class="upgrades">
        <div class="upgrade-title">
            ✨ УЛУЧШЕНИЯ ✨
        </div>
        <div class="upgrade-buttons">
            <button class="upgrade-btn" id="autoClickerBtn">
                🤖 Авто-кликер <span id="autoLevel">0</span> ⚡ (<span id="autoCost">50</span>)
            </button>
            <button class="upgrade-btn" id="powerUpBtn">
                💪 Сила клика <span id="powerLevel">0</span> 🔨 (<span id="powerCost">30</span>)
            </button>
            <button class="upgrade-btn max-btn" id="maxAutoBtn">
                ⚡ Купить MAX авто
            </button>
            <button class="upgrade-btn max-btn" id="maxPowerBtn">
                💥 Купить MAX силу
            </button>
            <button class="upgrade-btn reset-btn" id="resetGameBtn">
                🔄 Сброс
            </button>
        </div>
        <div style="font-size: 0.75rem; margin-top: 12px; color:#61482e;">
            💡 Тапай на хомяка → +<span id="clickPowerDisplay">1</span> очко
        </div>
        <div class="save-badge">💾 Автосохранение | Формат: 1k, 1M, 1B, 1T, 1qa, 1qi...</div>
    </div>
    <footer>🐹 Покупай на ВСЕ ДЕНЬГИ кнопками MAX!</footer>
</div>

<script>
    (function(){
        // ---------- Ключи для localStorage ----------
        const STORAGE_KEYS = {
            SCORE: 'hamsterScore',
            AUTO_LEVEL: 'hamsterAutoLevel',
            POWER_LEVEL: 'hamsterPowerLevel',
            BEST_SCORE: 'hamsterBestScore'
        };
        
        // ---------- Игровые данные ----------
        let score = 0;                  // текущие очки (число с плавающей, но целое)
        let bestScore = 0;             // рекорд
        let autoClickerLevel = 0;      // уровень автокликера
        let powerUpLevel = 0;          // уровень улучшения силы клика
        
        // Интервал для авто-кликера
        let autoInterval = null;
        
        // DOM элементы
        const scoreDisplay = document.getElementById('scoreDisplay');
        const bestDisplay = document.getElementById('bestDisplay');
        const hamsterZone = document.getElementById('hamsterClickZone');
        const autoClickerBtn = document.getElementById('autoClickerBtn');
        const powerUpBtn = document.getElementById('powerUpBtn');
        const maxAutoBtn = document.getElementById('maxAutoBtn');
        const maxPowerBtn = document.getElementById('maxPowerBtn');
        const resetGameBtn = document.getElementById('resetGameBtn');
        const autoLevelSpan = document.getElementById('autoLevel');
        const autoCostSpan = document.getElementById('autoCost');
        const powerLevelSpan = document.getElementById('powerLevel');
        const powerCostSpan = document.getElementById('powerCost');
        const clickPowerDisplay = document.getElementById('clickPowerDisplay');
        
        // ---------- Функция форматирования больших чисел (1k, 1M, 1B, 1T, 1qa, 1qi, 1sx и т.д.) ----------
        function formatNumber(num) {
            if (num === undefined || num === null) return "0";
            // Округляем вниз, так как очки целые
            let n = Math.floor(num);
            if (n < 1000) return n.toString();
            
            const suffixes = [
                { value: 1e3, symbol: "k" },      // thousand
                { value: 1e6, symbol: "M" },      // million
                { value: 1e9, symbol: "B" },      // billion
                { value: 1e12, symbol: "T" },     // trillion
                { value: 1e15, symbol: "qa" },    // quadrillion
                { value: 1e18, symbol: "qi" },    // quintillion
                { value: 1e21, symbol: "sx" },    // sextillion
                { value: 1e24, symbol: "sp" },    // septillion
                { value: 1e27, symbol: "oc" },    // octillion
                { value: 1e30, symbol: "no" },    // nonillion
                { value: 1e33, symbol: "dc" }     // decillion
            ];
            
            for (let i = suffixes.length - 1; i >= 0; i--) {
                if (n >= suffixes[i].value) {
                    let val = n / suffixes[i].value;
                    // Оставляем 2 знака после запятой, если нужно
                    let formatted = val.toFixed(2);
                    // Убираем .00 если они есть
                    formatted = formatted.replace(/\.00$/, '');
                    return formatted + suffixes[i].symbol;
                }
            }
            return n.toString();
        }
        
        // Обновление отображения с форматом
        function updateDisplay() {
            scoreDisplay.innerText = formatNumber(score);
            bestDisplay.innerText = formatNumber(bestScore);
        }
        
        // Пересчёт цены для авто-кликера (база 50 + уровень*18, макс цена 20k чтобы не улететь в космос)
        function getAutoCost() {
            return Math.min(20000, 50 + autoClickerLevel * 18);
        }
        
        // Цена силы клика (база 30 + уровень*12, макс 15000)
        function getPowerCost() {
            return Math.min(15000, 30 + powerUpLevel * 12);
        }
        
        // Обновить цены и состояния кнопок
        function updateUI() {
            const autoCost = getAutoCost();
            const powerCost = getPowerCost();
            
            autoCostSpan.innerText = formatNumber(autoCost);
            powerCostSpan.innerText = formatNumber(powerCost);
            autoLevelSpan.innerText = autoClickerLevel;
            powerLevelSpan.innerText = powerUpLevel;
            
            const totalClickPower = 1 + powerUpLevel;
            clickPowerDisplay.innerText = totalClickPower;
            
            // Блокировка обычных кнопок если не хватает
            if (score < autoCost) {
                autoClickerBtn.classList.add('disabled');
            } else {
                autoClickerBtn.classList.remove('disabled');
            }
            
            if (score < powerCost) {
                powerUpBtn.classList.add('disabled');
            } else {
                powerUpBtn.classList.remove('disabled');
            }
            
            // Обновляем рекорд
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem(STORAGE_KEYS.BEST_SCORE, Math.floor(bestScore));
            }
            updateDisplay();
        }
        
        // Сохраняем всё в localStorage
        function saveGame() {
            localStorage.setItem(STORAGE_KEYS.SCORE, Math.floor(score));
            localStorage.setItem(STORAGE_KEYS.AUTO_LEVEL, autoClickerLevel);
            localStorage.setItem(STORAGE_KEYS.POWER_LEVEL, powerUpLevel);
            localStorage.setItem(STORAGE_KEYS.BEST_SCORE, Math.floor(bestScore));
        }
        
        // Загрузка из localStorage
        function loadGame() {
            const savedScore = localStorage.getItem(STORAGE_KEYS.SCORE);
            if (savedScore !== null && !isNaN(parseInt(savedScore))) score = parseInt(savedScore);
            else score = 0;
            
            const savedAuto = localStorage.getItem(STORAGE_KEYS.AUTO_LEVEL);
            if (savedAuto !== null && !isNaN(parseInt(savedAuto))) autoClickerLevel = parseInt(savedAuto);
            else autoClickerLevel = 0;
            
            const savedPower = localStorage.getItem(STORAGE_KEYS.POWER_LEVEL);
            if (savedPower !== null && !isNaN(parseInt(savedPower))) powerUpLevel = parseInt(savedPower);
            else powerUpLevel = 0;
            
            const savedBest = localStorage.getItem(STORAGE_KEYS.BEST_SCORE);
            if (savedBest !== null && !isNaN(parseInt(savedBest))) bestScore = parseInt(savedBest);
            else bestScore = 0;
            
            // Валидация
            if (score < 0) score = 0;
            if (autoClickerLevel < 0) autoClickerLevel = 0;
            if (powerUpLevel < 0) powerUpLevel = 0;
            if (bestScore < 0) bestScore = 0;
        }
        
        // Перезапуск интервала авто-кликера
        function restartAutoClicker() {
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
            }
            if (autoClickerLevel > 0) {
                autoInterval = setInterval(() => {
                    if (autoClickerLevel > 0) {
                        let autoGain = autoClickerLevel;
                        addScore(autoGain, false, true);
                        showFloatingText(`🤖 +${autoGain}`, hamsterZone, '#b3ffa7');
                        saveGame();
                        updateUI();
                    }
                }, 1000);
            }
        }
        
        // Добавление очков (с анимацией и сохранением)
        function addScore(amount, fromClick = false, isAuto = false) {
            if (amount <= 0) return;
            score += amount;
            score = Math.floor(score);
            if (score > bestScore) {
                bestScore = score;
            }
            updateUI();
            saveGame();
            
            if (fromClick && hamsterZone) {
                showFloatingText(`+${amount}`, hamsterZone, '#ffd966');
            }
        }
        
        // Парящие числа
        function showFloatingText(text, originElement, colorHint = '#ffec5e') {
            if (!originElement) return;
            const rect = originElement.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            const div = document.createElement('div');
            div.className = 'floating-number';
            div.innerText = text;
            div.style.left = x - 25 + 'px';
            div.style.top = y - 20 + 'px';
            div.style.color = colorHint;
            div.style.fontWeight = 'bold';
            div.style.fontSize = '1.8rem';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 700);
        }
        
        // Эффект клика по хомяку
        function addHamsterClickEffect() {
            const hamsterDiv = document.querySelector('.hamster');
            if (hamsterDiv) {
                hamsterDiv.classList.add('click-effect');
                setTimeout(() => hamsterDiv.classList.remove('click-effect'), 100);
            }
            const faceSpan = document.getElementById('hamsterFace');
            if (faceSpan) {
                const original = faceSpan.innerText;
                faceSpan.innerText = '🐹💥';
                setTimeout(() => faceSpan.innerText = original, 150);
            }
        }
        
        function onHamsterClick() {
            const clickValue = 1 + powerUpLevel;
            addScore(clickValue, true, false);
            addHamsterClickEffect();
        }
        
        // Покупка 1 уровня авто
        function buyAuto() {
            const cost = getAutoCost();
            if (score >= cost) {
                score -= cost;
                autoClickerLevel++;
                restartAutoClicker();
                updateUI();
                saveGame();
                showFloatingText(`🚀 Авто lvl ${autoClickerLevel}`, autoClickerBtn, '#ffbc6e');
            } else {
                showFloatingText(`🧀 Нужно ${formatNumber(cost)}`, autoClickerBtn, '#ffaa88');
            }
        }
        
        // Покупка 1 уровня силы
        function buyPower() {
            const cost = getPowerCost();
            if (score >= cost) {
                score -= cost;
                powerUpLevel++;
                updateUI();
                saveGame();
                showFloatingText(`💪 Сила +1 (теперь +${1+powerUpLevel})`, powerUpBtn, '#ffb347');
            } else {
                showFloatingText(`🧀 Нужно ${formatNumber(cost)}`, powerUpBtn, '#ffaa88');
            }
        }
        
        // --- ПОКУПКА НА ВСЕ ДЕНЬГИ (MAX) ---
        function buyMaxAuto() {
            if (score <= 0) {
                showFloatingText(`Нет очков для авто`, maxAutoBtn, '#ffaa88');
                return;
            }
            let boughtCount = 0;
            let maxLoops = 500; // защита от бесконечного цикла
            while (maxLoops-- > 0) {
                let currentCost = getAutoCost();
                if (score >= currentCost) {
                    score -= currentCost;
                    autoClickerLevel++;
                    boughtCount++;
                } else {
                    break;
                }
            }
            if (boughtCount > 0) {
                restartAutoClicker();
                updateUI();
                saveGame();
                showFloatingText(`⚡ Куплено авто x${boughtCount}! Уровень ${autoClickerLevel}`, maxAutoBtn, '#e5ff9e');
            } else {
                showFloatingText(`Не хватает даже на 1 авто (нужно ${formatNumber(getAutoCost())})`, maxAutoBtn, '#ffaa88');
            }
        }
        
        function buyMaxPower() {
            if (score <= 0) {
                showFloatingText(`Нет очков для силы`, maxPowerBtn, '#ffaa88');
                return;
            }
            let boughtCount = 0;
            let maxLoops = 500;
            while (maxLoops-- > 0) {
                let currentCost = getPowerCost();
                if (score >= currentCost) {
                    score -= currentCost;
                    powerUpLevel++;
                    boughtCount++;
                } else {
                    break;
                }
            }
            if (boughtCount > 0) {
                updateUI();
                saveGame();
                showFloatingText(`💥 Сила клика +${boughtCount} (теперь +${1+powerUpLevel})`, maxPowerBtn, '#ffd966');
            } else {
                showFloatingText(`Не хватает на 1 силу (нужно ${formatNumber(getPowerCost())})`, maxPowerBtn, '#ffaa88');
            }
        }
        
        // Сброс игры (рекорд остаётся)
        function resetGame() {
            if (confirm('Сбросить прогресс? Очки, авто-кликер и сила клика обнулятся. Рекорд останется.')) {
                if (autoInterval) {
                    clearInterval(autoInterval);
                    autoInterval = null;
                }
                score = 0;
                autoClickerLevel = 0;
                powerUpLevel = 0;
                restartAutoClicker(); // уровень 0 -> нет интервала
                updateUI();
                saveGame();
                showFloatingText(`🌀 Игра сброшена`, resetGameBtn, '#ffbf8f');
            }
        }
        
        // Сохранение перед выходом
        function handleBeforeUnload() {
            saveGame();
        }
        
        // Инициализация
        function init() {
            loadGame();
            // Синхронизируем bestScore на случай если текущий score > bestScore
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem(STORAGE_KEYS.BEST_SCORE, bestScore);
            }
            updateUI();
            restartAutoClicker();
            
            // События
            hamsterZone.addEventListener('click', (e) => {
                e.stopPropagation();
                onHamsterClick();
            });
            autoClickerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                buyAuto();
            });
            powerUpBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                buyPower();
            });
            maxAutoBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                buyMaxAuto();
            });
            maxPowerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                buyMaxPower();
            });
            resetGameBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                resetGame();
            });
            
            window.addEventListener('beforeunload', handleBeforeUnload);
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) saveGame();
            });
        }
        
        init();
    })();
</script>
</body>
</html>
